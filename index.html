<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type Quest</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="lesson-card">
      <p class="eyebrow">Lesson 1 · Home row</p>
      <h1>Wake the friendly robot</h1>
      <p class="instructions">
        Keep your fingers on <strong>F</strong> and <strong>J</strong>. Type the pattern below.
      </p>

      <section class="exercise" aria-labelledby="exercise-heading">
        <h2 id="exercise-heading">Your mission</h2>
        <p id="target" class="target" aria-label="Letters to type">f j f j</p>
        <p id="feedback" class="feedback" aria-live="polite">Press the first letter when you are ready.</p>
      </section>

      <button id="restart-button" type="button">Try again</button>
    </main>

    <script src="app.js"></script>
  </body>
</html>
